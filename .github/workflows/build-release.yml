name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build valac \
            libgtk-4-dev libadwaita-1-dev \
            libsoup-3.0-dev libjson-glib-dev \
            libwebkitgtk-6.0-dev \
            libcmark-gfm-dev libcmark-gfm-extensions-dev \
            libjs-katex fonts-katex \
            desktop-file-utils

      - name: Install packaging tools
        run: |
          sudo apt-get install -y ruby ruby-dev rpm
          sudo gem install fpm --no-document

      - name: Generate version
        id: version
        run: |
          VERSION="0.1.0+git$(date -u +'%Y%m%d').$(echo $GITHUB_SHA | head -c 7)"
          TAG="v$(date -u +'%Y.%m.%d')-$(echo $GITHUB_SHA | head -c 7)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  Tag: $TAG"

      - name: Configure
        run: meson setup build --buildtype=release --prefix=/usr

      - name: Build
        run: ninja -C build

      - name: Install to staging directory
        run: DESTDIR="$PWD/staging" ninja -C build install

      - name: Resolve cmark package names
        id: cmark
        run: |
          CMARK_PKG=$(dpkg -S libcmark-gfm.so | head -1 | cut -d: -f1)
          CMARK_EXT_PKG=$(dpkg -S libcmark-gfm-extensions.so | head -1 | cut -d: -f1)
          echo "pkg=$CMARK_PKG" >> "$GITHUB_OUTPUT"
          echo "ext_pkg=$CMARK_EXT_PKG" >> "$GITHUB_OUTPUT"
          echo "Resolved: $CMARK_PKG, $CMARK_EXT_PKG"

      - name: Build .deb package
        run: |
          fpm -s dir -t deb \
            -n llm-studio \
            -v "${{ steps.version.outputs.version }}" \
            --description "Run and chat with local large language models" \
            --url "https://github.com/${{ github.repository }}" \
            --license "MIT" \
            --maintainer "${{ github.repository_owner }}" \
            --architecture amd64 \
            --depends libgtk-4-1 \
            --depends libadwaita-1-0 \
            --depends "libsoup-3.0-0 | libsoup3.0-0" \
            --depends libjson-glib-1.0-0 \
            --depends libwebkitgtk-6.0-4 \
            --depends "${{ steps.cmark.outputs.pkg }}" \
            --depends "${{ steps.cmark.outputs.ext_pkg }}" \
            --depends libjs-katex \
            --depends fonts-katex \
            --category "Development" \
            --deb-no-default-config-files \
            -C staging \
            -p llm-studio_amd64.deb

      - name: Build .rpm package
        run: |
          fpm -s dir -t rpm \
            -n llm-studio \
            -v "${{ steps.version.outputs.version }}" \
            --description "Run and chat with local large language models" \
            --url "https://github.com/${{ github.repository }}" \
            --license "MIT" \
            --maintainer "${{ github.repository_owner }}" \
            --architecture x86_64 \
            --depends gtk4 \
            --depends libadwaita \
            --depends libsoup3 \
            --depends json-glib \
            --depends webkitgtk6.0 \
            --depends cmark-gfm \
            --category "Development" \
            -C staging \
            -p llm-studio_x86_64.rpm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LLM Studio ${{ steps.version.outputs.tag }}
          body: |
            Automated build from commit ${{ github.sha }}.

            ### Install on Debian/Ubuntu
            ```bash
            sudo apt install ./llm-studio_amd64.deb
            ```

            ### Install on Fedora/RHEL
            ```bash
            sudo dnf install ./llm-studio_x86_64.rpm
            ```
          files: |
            llm-studio_amd64.deb
            llm-studio_x86_64.rpm
          generate_release_notes: true
